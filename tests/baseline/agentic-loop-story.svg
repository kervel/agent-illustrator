<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -60 860 540" data-frames="idle,user_prompt,system_prompt,tool_response,tool_exec,result_return,final_answer">
  <style>
    :root {
    --foreground-2: #666666;
    --foreground-light: #e0e0e0;
    --text-dark: #1a1a1a;
    --accent-1: #2196f3;
    --foreground-1: #333333;
    --foreground-3: #999999;
    --background-light: #ffffff;
    --foreground-dark: #1a1a1a;
    --accent-3: #bbdefb;
    --accent-light: #e3f2fd;
    --text-2: #666666;
    --secondary-1: #ff9800;
    --text-light: #ffffff;
    --background-dark: #333333;
    --text-1: #333333;
    --background-1: #ffffff;
    --secondary-3: #ffe0b2;
    --secondary-light: #fff3e0;
    --accent-2: #e3f2fd;
    --accent-dark: #1565c0;
    --secondary-dark: #e65100;
    --status-error: #f44336;
    --background-3: #eeeeee;
    --secondary-2: #fff3e0;
    --status-success: #4caf50;
    --status-warning: #ff9800;
    --text-3: #999999;
    --background-2: #f5f5f5;
  }

    /* Keyframe animation CSS (auto-generated) */
.kf-hidden { opacity: 0; }
.frame-idle {
}
.frame-user_prompt {
  .kf-speech_bubble { opacity: 1; }
  .ai-connection.conn-prompt_arrow { opacity: 1; }
}
.frame-system_prompt {
  .kf-sys_envelope { opacity: 1; }
  .kf-sys_line1 { opacity: 1; }
  .kf-sys_line2 { opacity: 1; }
  .ai-connection.conn-req_arrow { opacity: 1; }
}
.frame-tool_response {
  .kf-tc_line1 { opacity: 1; }
  .kf-tc_line2 { opacity: 1; }
  .kf-tool_call_envelope { opacity: 1; }
  .ai-connection.conn-resp_arrow { opacity: 1; }
}
.frame-tool_exec {
  .kf-exec_envelope { opacity: 1; }
  .kf-exec_line1 { opacity: 1; }
  .kf-exec_line2 { opacity: 1; }
  .ai-connection.conn-exec_arrow { opacity: 1; }
}
.frame-result_return {
  .kf-result_envelope { opacity: 1; }
  .kf-result_line1 { opacity: 1; }
  .kf-result_line2 { opacity: 1; }
  .ai-connection.conn-return_to_cli { opacity: 1; }
  .ai-connection.conn-return_to_cloud { opacity: 1; }
}
.frame-final_answer {
  .kf-ans_line1 { opacity: 1; }
  .kf-ans_line2 { opacity: 1; }
  .kf-answer_envelope { opacity: 1; }
  .ai-connection.conn-final_to_cli { opacity: 1; }
  .ai-connection.conn-final_to_user { opacity: 1; }
}

    /* Kapernikov Brand Stylesheet for Agent Illustrator
   Colors from kapernikov-theme.css (huisstijlgids v4)
*/

:root {
  /* Foreground colors (lines, primary visual elements) */
  --foreground-1: #484847;       /* Dark grey */
  --foreground-2: #818281;       /* Medium grey */
  --foreground-3: #bfc0c0;       /* Light grey */
  --foreground-light: #ececec;   /* Very light grey */
  --foreground-dark: #000000;    /* Black */

  /* Background colors */
  --background-1: #ffffff;       /* White */
  --background-2: #ececec;       /* Very light grey */
  --background-3: #e2d7cd;       /* Beige */
  --background-light: #ffffff;
  --background-dark: #484847;    /* Dark grey */

  /* Text colors */
  --text-1: #484847;
  --text-2: #818281;
  --text-3: #bfc0c0;
  --text-light: #ffffff;
  --text-dark: #484847;

  /* Accent colors (brand red family) */
  --accent-1: #ba2415;           /* Primary brand red */
  --accent-2: #D4734F;           /* Red light */
  --accent-3: #dd977a;           /* Red lighter */
  --accent-light: #e2d7cd;       /* Beige (warm light fill) */
  --accent-dark: #901C1D;        /* Crimson */

  /* Secondary colors (cool teal/petrol) */
  --secondary-1: #1D6E88;        /* Petrol */
  --secondary-2: #1F92A6;        /* Cyan */
  --secondary-3: #36b191;        /* Jade */
  --secondary-light: #ececec;    /* Very light grey */
  --secondary-dark: #1D6E88;     /* Petrol */

  /* Extra brand colors (not in standard token set) */
  --kpv-burgundy: #5a322b;
  --kpv-amber: #FFB31B;

  /* Status colors */
  --status-success: #1E9F49;     /* Emerald */
  --status-warning: #DD8028;     /* Tangerine */
  --status-error: #ba2415;       /* Brand red */
}

/* Typography */
.ai-label, .ai-text {
  font-family: 'Avenir LT Std', 'Avenir', 'Segoe UI', Roboto, Arial, sans-serif;
}

/* Shape defaults: rounded corners, softer stroke */
.ai-rect {
  rx: 4;
  ry: 4;
}

/* Opt-out for schematics / electronic symbols */
.schematic .ai-rect {
  rx: 0;
  ry: 0;
}

/* White labels on dark fills (adjacent sibling only) */
[fill="var(--accent-1)"] + .ai-label,
[fill="var(--accent-dark)"] + .ai-label,
[fill="var(--secondary-1)"] + .ai-label,
[fill="var(--secondary-2)"] + .ai-label,
[fill="var(--secondary-3)"] + .ai-label,
[fill="var(--secondary-dark)"] + .ai-label,
[fill="var(--foreground-1)"] + .ai-label,
[fill="var(--foreground-dark)"] + .ai-label {
  fill: var(--text-light);
}

  </style>
  <defs>
