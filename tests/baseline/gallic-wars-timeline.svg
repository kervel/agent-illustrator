    <text id="t57a" class="ai-shape ai-text" x="226.9" y="233.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-1)">Subdues</text>
    <text id="t57b" class="ai-shape ai-text" x="217" y="245.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-2)">the Belgae</text>
    <rect id="bg52" class="ai-shape ai-rect" x="495" y="212" width="150" height="62" fill="var(--accent-1)" stroke="var(--accent-dark)" stroke-width="2"/>
    <text id="t52" class="ai-shape ai-text" x="552" y="224" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-light)">52 BC</text>
    <text id="t52a" class="ai-shape ai-text" x="516" y="239" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-light)">Siege of Alesia</text>
    <text id="t52b" class="ai-shape ai-text" x="498" y="251" text-anchor="start" dominant-baseline="middle" font-size="10" fill="var(--accent-light)">Vercingetorix surrenders</text>
  </g>
</svg>
