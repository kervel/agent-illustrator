    <text id="t58b" class="ai-shape ai-text" x="50.4" y="117.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-2)">&amp; Ariovistus</text>
    <rect id="bg55" class="ai-shape ai-rect" x="340" y="81" width="140" height="50" fill="var(--background-2)" stroke="var(--foreground-3)" stroke-width="1"/>
    <text id="t55" class="ai-shape ai-text" x="393.5" y="91.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--accent-dark)">55 BC</text>
