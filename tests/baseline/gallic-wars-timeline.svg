    <text id="t55b" class="ai-shape ai-text" x="353.9" y="117.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-2)">&amp; invades Britain</text>
    <rect id="bg50" class="ai-shape ai-rect" x="660" y="81" width="140" height="50" fill="var(--background-2)" stroke="var(--foreground-3)" stroke-width="1"/>
