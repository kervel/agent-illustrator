    <text id="t50a" class="ai-shape ai-text" x="693.7" y="105.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-1)">All of Gaul</text>
    <text id="t50b" class="ai-shape ai-text" x="703.6" y="117.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--text-2)">pacified</text>
