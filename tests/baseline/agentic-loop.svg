<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100.5 -57 841 547">
  <style>
    /* Kapernikov Brand Stylesheet for Agent Illustrator
   Colors from kapernikov-theme.css (huisstijlgids v4)
*/

:root {
  /* Foreground colors (lines, primary visual elements) */
  --foreground-1: #484847;       /* Dark grey */
  --foreground-2: #818281;       /* Medium grey */
  --foreground-3: #bfc0c0;       /* Light grey */
  --foreground-light: #ececec;   /* Very light grey */
  --foreground-dark: #000000;    /* Black */

  /* Background colors */
  --background-1: #ffffff;       /* White */
  --background-2: #ececec;       /* Very light grey */
  --background-3: #e2d7cd;       /* Beige */
  --background-light: #ffffff;
  --background-dark: #484847;    /* Dark grey */

  /* Text colors */
  --text-1: #484847;
  --text-2: #818281;
  --text-3: #bfc0c0;
  --text-light: #ffffff;
  --text-dark: #484847;

  /* Accent colors (brand red family) */
  --accent-1: #ba2415;           /* Primary brand red */
  --accent-2: #D4734F;           /* Red light */
  --accent-3: #dd977a;           /* Red lighter */
  --accent-light: #e2d7cd;       /* Beige (warm light fill) */
  --accent-dark: #901C1D;        /* Crimson */

  /* Secondary colors (cool teal/petrol) */
  --secondary-1: #1D6E88;        /* Petrol */
  --secondary-2: #1F92A6;        /* Cyan */
  --secondary-3: #36b191;        /* Jade */
  --secondary-light: #ececec;    /* Very light grey */
  --secondary-dark: #1D6E88;     /* Petrol */

  /* Extra brand colors (not in standard token set) */
  --kpv-burgundy: #5a322b;
  --kpv-amber: #FFB31B;

  /* Status colors */
  --status-success: #1E9F49;     /* Emerald */
  --status-warning: #DD8028;     /* Tangerine */
  --status-error: #ba2415;       /* Brand red */
}

/* Typography */
.ai-label, .ai-text {
  font-family: 'Avenir LT Std', 'Avenir', 'Segoe UI', Roboto, Arial, sans-serif;
}

/* Shape defaults: rounded corners, softer stroke */
.ai-rect {
  rx: 4;
  ry: 4;
}

/* Opt-out for schematics / electronic symbols */
.schematic .ai-rect {
  rx: 0;
  ry: 0;
}

/* White labels on dark fills (adjacent sibling only) */
[fill="var(--accent-1)"] + .ai-label,
[fill="var(--accent-dark)"] + .ai-label,
[fill="var(--secondary-1)"] + .ai-label,
[fill="var(--secondary-2)"] + .ai-label,
[fill="var(--secondary-3)"] + .ai-label,
[fill="var(--secondary-dark)"] + .ai-label,
[fill="var(--foreground-1)"] + .ai-label,
[fill="var(--foreground-dark)"] + .ai-label {
  fill: var(--text-light);
}

  </style>
  <defs>
    <marker id="ai-arrow" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="4" markerHeight="4" markerUnits="strokeWidth" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect id="cli" class="ai-shape ai-rect" x="30" y="25" width="180" height="70" fill="var(--accent-light)" stroke="var(--accent-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="120" y="60" text-anchor="middle" dominant-baseline="middle">CLI Agent</text>
  <rect id="llm" class="ai-shape ai-rect" x="430" y="25" width="180" height="70" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="520" y="60" text-anchor="middle" dominant-baseline="middle">LLM API</text>
  <rect id="tool" class="ai-shape ai-rect" x="430" y="345" width="180" height="70" fill="var(--foreground-3)" stroke="var(--foreground-1)" stroke-width="2.5"/>
  <text class="ai-label" x="520" y="380" text-anchor="middle" dominant-baseline="middle">Tool (bash)</text>
  <rect id="user" class="ai-shape ai-rect" x="30" y="345" width="180" height="70" fill="var(--accent-light)" stroke="var(--accent-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="120" y="380" text-anchor="middle" dominant-baseline="middle">User</text>
  <circle id="via_right" class="ai-shape ai-circle" cx="680" cy="220" r="0.5" fill="none" stroke="none" stroke-width="1.5"/>
  <circle id="via_left" class="ai-shape ai-circle" cx="-40" cy="220" r="0.5" fill="none" stroke="none" stroke-width="1.5"/>
  <g id="phase1" class="ai-container phase1">
    <rect id="p1_envelope" class="ai-shape ai-rect" x="220" y="20" width="200" height="80" fill="var(--accent-light)" stroke="var(--accent-1)" stroke-width="2" opacity="0.3"/>
    <text id="p1_line1" class="ai-shape ai-text" x="269.3" y="48" text-anchor="start" dominant-baseline="middle" font-size="13" fill="var(--text-3)">system prompt</text>
    <text id="p1_line2" class="ai-shape ai-text" x="231.8" y="72" text-anchor="start" dominant-baseline="middle" font-size="14" fill="var(--accent-dark)">user: &apos;list my files&apos;</text>
    <text id="p1_title" class="ai-shape ai-text" x="290.3" y="8.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--accent-1)">REQUEST 1</text>
  </g>
  <g id="phase2" class="ai-container phase2">
    <rect id="p2_envelope" class="ai-shape ai-rect" x="220" y="20" width="200" height="80" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2" opacity="0.3"/>
    <text id="p2_line1" class="ai-shape ai-text" x="281" y="48" text-anchor="start" dominant-baseline="middle" font-size="13" fill="var(--text-3)">tool_call:</text>
    <text id="p2_line2" class="ai-shape ai-text" x="261.2" y="72" text-anchor="start" dominant-baseline="middle" font-size="14" fill="var(--secondary-dark)">bash(&apos;ls -la&apos;)</text>
    <text id="p2_title" class="ai-shape ai-text" x="287" y="111.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--secondary-dark)">RESPONSE 1</text>
  </g>
  <g id="phase3" class="ai-container phase3">
    <rect id="p3_envelope" class="ai-shape ai-rect" x="420" y="170" width="200" height="100" fill="var(--foreground-3)" stroke="var(--foreground-1)" stroke-width="2" opacity="0.2"/>
    <text id="p3_cmd" class="ai-shape ai-text" x="486.4" y="196" text-anchor="start" dominant-baseline="middle" font-size="14" fill="var(--foreground-1)">$ ls -la</text>
    <text id="p3_out1" class="ai-shape ai-text" x="462.4" y="224" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-3)">drwxr-xr-x  src/</text>
    <text id="p3_out2" class="ai-shape ai-text" x="451.6" y="244" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-3)">-rw-r--r--  main.rs</text>
    <text id="p3_title" class="ai-shape ai-text" x="496.9" y="158.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--foreground-1)">EXECUTE</text>
  </g>
  <g id="phase4" class="ai-container phase4">
    <rect id="p4_envelope" class="ai-shape ai-rect" x="220" y="330" width="200" height="100" fill="var(--accent-light)" stroke="var(--accent-1)" stroke-width="2" opacity="0.3"/>
    <text id="p4_line1" class="ai-shape ai-text" x="273.2" y="356" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-3)">system prompt</text>
    <text id="p4_line2" class="ai-shape ai-text" x="244.4" y="380" text-anchor="start" dominant-baseline="middle" font-size="12" fill="var(--text-3)">user: &apos;list my files&apos;</text>
    <text id="p4_line3" class="ai-shape ai-text" x="230.3" y="404" text-anchor="start" dominant-baseline="middle" font-size="13" fill="var(--accent-dark)">tool_result: &apos;src/ ...&apos;</text>
    <text id="p4_title" class="ai-shape ai-text" x="290.3" y="318.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--accent-1)">REQUEST 2</text>
  </g>
  <g id="phase5" class="ai-container phase5">
    <rect id="p5_envelope" class="ai-shape ai-rect" x="20" y="180" width="200" height="80" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2" opacity="0.3"/>
    <text id="p5_line1" class="ai-shape ai-text" x="42" y="208" text-anchor="start" dominant-baseline="middle" font-size="13" fill="var(--secondary-dark)">Here are your files:</text>
    <text id="p5_line2" class="ai-shape ai-text" x="65.4" y="232" text-anchor="start" dominant-baseline="middle" font-size="14" fill="var(--text-1)">src/, main.rs</text>
    <text id="p5_title" class="ai-shape ai-text" x="87" y="168.5" text-anchor="start" dominant-baseline="middle" font-size="11" fill="var(--secondary-dark)">RESPONSE 2</text>
  </g>
  <path class="ai-connection phase1" d="M210 60 L419.2 60" fill="none" stroke="var(--accent-1)" stroke-width="3" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection phase2" d="M430 60 L220.8 60" fill="none" stroke="var(--secondary-dark)" stroke-width="3" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection phase3" d="M120 95 L120 220 L520 220 L520 334.2" fill="none" stroke="var(--foreground-1)" stroke-width="3" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection phase4" d="M610 380 C668.2141639885766 380 680 278.2141639885766 680 220 C680 161.78583601142338 668.2141639885766 60 620.8 60" fill="none" stroke="var(--accent-1)" stroke-width="3" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection phase5" d="M430 60 L120 60 L120 334.2" fill="none" stroke="var(--secondary-dark)" stroke-width="3" marker-end="url(#ai-arrow)"/>
</svg>
