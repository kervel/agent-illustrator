<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-170.79999999999998 -40 542.8 355">
  <style>
    :root {
    --secondary-1: #ff9800;
    --foreground-1: #333333;
