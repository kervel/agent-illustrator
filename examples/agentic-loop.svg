<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 725 520" data-frames="startup,request,tool_call,execute,return,respond">
  <style>
    :root {
    --foreground-light: #e0e0e0;
    --accent-2: #e3f2fd;
    --accent-1: #2196f3;
    --text-1: #333333;
    --foreground-1: #333333;
    --secondary-2: #fff3e0;
    --text-dark: #1a1a1a;
    --secondary-3: #ffe0b2;
    --foreground-2: #666666;
    --text-light: #ffffff;
    --accent-dark: #1565c0;
    --secondary-light: #fff3e0;
    --secondary-dark: #e65100;
    --status-warning: #ff9800;
    --status-error: #f44336;
    --background-dark: #333333;
    --secondary-1: #ff9800;
    --accent-light: #e3f2fd;
    --foreground-3: #999999;
    --accent-3: #bbdefb;
    --background-3: #eeeeee;
    --status-success: #4caf50;
    --background-2: #f5f5f5;
    --background-light: #ffffff;
    --text-2: #666666;
    --text-3: #999999;
    --foreground-dark: #1a1a1a;
    --background-1: #ffffff;
  }

    /* Keyframe animation CSS (auto-generated) */
.kf-hidden { opacity: 0; }
.frame-startup {
}
.frame-request {
  .kf-req1_env { opacity: 1; }
  .ai-connection.conn-send_req1 { opacity: 1; }
}
.frame-tool_call {
  .kf-resp1_env { opacity: 1; }
  .ai-connection.conn-recv_resp1 { opacity: 1; }
}
.frame-execute {
  .kf-exec_env { opacity: 1; }
  .ai-connection.conn-exec_tool { opacity: 1; }
}
.frame-return {
  .kf-req2_env { opacity: 1; }
  .ai-connection.conn-send_req2 { opacity: 1; }
}
.frame-respond {
  .kf-resp2_env { opacity: 1; }
  .ai-connection.conn-recv_resp2 { opacity: 1; }
}

    /* Kapernikov Brand Stylesheet for Agent Illustrator
   Colors from kapernikov-theme.css (huisstijlgids v4)
*/

:root {
  /* Foreground colors (lines, primary visual elements) */
  --foreground-1: #484847;       /* Dark grey */
  --foreground-2: #818281;       /* Medium grey */
  --foreground-3: #bfc0c0;       /* Light grey */
  --foreground-light: #ececec;   /* Very light grey */
  --foreground-dark: #000000;    /* Black */

  /* Background colors */
  --background-1: #ffffff;       /* White */
  --background-2: #ececec;       /* Very light grey */
  --background-3: #e2d7cd;       /* Beige */
  --background-light: #ffffff;
  --background-dark: #484847;    /* Dark grey */

  /* Text colors */
  --text-1: #484847;
  --text-2: #818281;
  --text-3: #bfc0c0;
  --text-light: #ffffff;
  --text-dark: #484847;

  /* Accent colors (brand red family) */
  --accent-1: #ba2415;           /* Primary brand red */
  --accent-2: #D4734F;           /* Red light */
  --accent-3: #dd977a;           /* Red lighter */
  --accent-light: #e2d7cd;       /* Beige (warm light fill) */
  --accent-dark: #901C1D;        /* Crimson */

  /* Secondary colors (cool teal/petrol) */
  --secondary-1: #1D6E88;        /* Petrol */
  --secondary-2: #1F92A6;        /* Cyan */
  --secondary-3: #36b191;        /* Jade */
  --secondary-light: #ececec;    /* Very light grey */
  --secondary-dark: #1D6E88;     /* Petrol */

  /* Extra brand colors (not in standard token set) */
  --kpv-burgundy: #5a322b;
  --kpv-amber: #FFB31B;

  /* Status colors */
  --status-success: #1E9F49;     /* Emerald */
  --status-warning: #DD8028;     /* Tangerine */
  --status-error: #ba2415;       /* Brand red */
}

/* Typography */
.ai-label, .ai-text {
  font-family: 'Avenir LT Std', 'Avenir', 'Segoe UI', Roboto, Arial, sans-serif;
}

/* Shape defaults: rounded corners, softer stroke */
.ai-rect {
  rx: 4;
  ry: 4;
}

/* Opt-out for schematics / electronic symbols */
.schematic .ai-rect {
  rx: 0;
  ry: 0;
}

/* White labels on dark fills (adjacent sibling only) */
[fill="var(--accent-1)"] + .ai-label,
[fill="var(--accent-dark)"] + .ai-label,
[fill="var(--secondary-1)"] + .ai-label,
[fill="var(--secondary-2)"] + .ai-label,
[fill="var(--secondary-3)"] + .ai-label,
[fill="var(--secondary-dark)"] + .ai-label,
[fill="var(--foreground-1)"] + .ai-label,
[fill="var(--foreground-dark)"] + .ai-label {
  fill: var(--text-light);
}

  </style>
  <defs>
    <marker id="ai-arrow" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="4" markerHeight="4" markerUnits="strokeWidth" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect id="cli" class="ai-shape ai-rect" x="30" y="25" width="180" height="70" fill="var(--accent-light)" stroke="var(--accent-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="120" y="60" text-anchor="middle" dominant-baseline="middle">CLI Agent</text>
  <rect id="llm" class="ai-shape ai-rect" x="430" y="25" width="180" height="70" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="520" y="60" text-anchor="middle" dominant-baseline="middle">LLM API</text>
  <rect id="tool" class="ai-shape ai-rect" x="430" y="345" width="180" height="70" fill="var(--foreground-3)" stroke="var(--foreground-1)" stroke-width="2.5"/>
  <text class="ai-label" x="520" y="380" text-anchor="middle" dominant-baseline="middle">Tool (bash)</text>
  <rect id="user" class="ai-shape ai-rect" x="30" y="345" width="180" height="70" fill="var(--accent-light)" stroke="var(--accent-dark)" stroke-width="2.5"/>
  <text class="ai-label" x="120" y="380" text-anchor="middle" dominant-baseline="middle">User</text>
  <g class="kf-hidden kf-req1_env">
    <rect id="req1_env" class="ai-shape ai-rect" x="220" y="20" width="200" height="80" fill="var(--accent-light)" stroke="var(--accent-1)" stroke-width="2" opacity="0.3"/>
    <text class="ai-label" x="320" y="60" text-anchor="middle" dominant-baseline="middle">system + user msg</text>
  </g>
  <g class="kf-hidden kf-resp1_env">
    <rect id="resp1_env" class="ai-shape ai-rect" x="220" y="20" width="200" height="80" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2" opacity="0.3"/>
    <text class="ai-label" x="320" y="60" text-anchor="middle" dominant-baseline="middle">tool_call: bash</text>
  </g>
  <g class="kf-hidden kf-exec_env">
    <rect id="exec_env" class="ai-shape ai-rect" x="420" y="170" width="200" height="100" fill="var(--foreground-3)" stroke="var(--foreground-1)" stroke-width="2" opacity="0.2"/>
    <text class="ai-label" x="520" y="220" text-anchor="middle" dominant-baseline="middle">$ ls -la</text>
  </g>
  <g class="kf-hidden kf-req2_env">
    <rect id="req2_env" class="ai-shape ai-rect" x="220" y="340" width="200" height="80" fill="var(--accent-light)" stroke="var(--accent-1)" stroke-width="2" opacity="0.3"/>
    <text class="ai-label" x="320" y="380" text-anchor="middle" dominant-baseline="middle">history + result</text>
  </g>
  <g class="kf-hidden kf-resp2_env">
    <rect id="resp2_env" class="ai-shape ai-rect" x="20" y="180" width="200" height="80" fill="var(--secondary-light)" stroke="var(--secondary-dark)" stroke-width="2" opacity="0.3"/>
    <text class="ai-label" x="120" y="220" text-anchor="middle" dominant-baseline="middle">text response</text>
  </g>
  <path class="ai-connection conn-send_req1" d="M210 60 L419.2 60" fill="none" stroke="var(--accent-1)" stroke-width="3" opacity="0" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection conn-recv_resp1" d="M430 60 L220.8 60" fill="none" stroke="var(--secondary-dark)" stroke-width="3" opacity="0" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection conn-exec_tool" d="M120 95 L120 220 L520 220 L520 334.2" fill="none" stroke="var(--foreground-1)" stroke-width="3" opacity="0" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection conn-send_req2" d="M610 380 L625 380 L625 60 L620.8 60" fill="none" stroke="var(--accent-1)" stroke-width="3" opacity="0" marker-end="url(#ai-arrow)"/>
  <path class="ai-connection conn-recv_resp2" d="M520 95 L520 220 L120 220 L120 334.2" fill="none" stroke="var(--secondary-dark)" stroke-width="3" opacity="0" marker-end="url(#ai-arrow)"/>
</svg>
