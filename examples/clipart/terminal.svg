<?xml version="1.0" encoding="UTF-8"?>
<!-- Terminal/CLI icon - public domain -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" width="80" height="64">
  <!-- Monitor body -->
  <rect x="2" y="2" width="76" height="50" rx="4" ry="4"
        fill="#2d2d2d" stroke="#333" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="6" y="6" width="68" height="42" rx="2" ry="2" fill="#1a1a2e"/>
  <!-- Prompt line 1: $ -->
  <text x="10" y="20" font-family="monospace" font-size="8" fill="#00ff88">$</text>
  <!-- Command text -->
  <text x="20" y="20" font-family="monospace" font-size="8" fill="#cccccc">run agent</text>
  <!-- Prompt line 2 -->
  <text x="10" y="32" font-family="monospace" font-size="8" fill="#00ff88">&gt;</text>
  <!-- Cursor -->
  <rect x="18" y="26" width="5" height="8" fill="#00ff88" opacity="0.7"/>
  <!-- Stand -->
  <rect x="32" y="52" width="16" height="6" fill="#555"/>
  <!-- Base -->
  <rect x="24" y="58" width="32" height="4" rx="1" ry="1" fill="#555"/>
</svg>
